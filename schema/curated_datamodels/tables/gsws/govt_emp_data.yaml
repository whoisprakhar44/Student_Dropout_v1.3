raw_ddl: "create table GSWSONLINE.GOVT_EMP_DATA\n(\n  CFMSID        NVARCHAR2(50),\n\
  \  AADHARNUMBER  VARCHAR2(50),\n  EMPLOYEENAME  NVARCHAR2(200),\n  SALARY      \
  \  NVARCHAR2(50),\n  CATEGORY      NVARCHAR2(50),\n  DESIGNATION   VARCHAR2(250),\n\
  \  BAADHARNUMBER VARCHAR2(50),\n  CREATED_BY    VARCHAR2(20),\n  IS_ACTIVE     VARCHAR2(5),\n\
  \  MOBILENUMBER  NUMBER,\n  ACTION_DATE   DATE,\n  MAINCATEGORY  VARCHAR2(50),\n\
  \  UPDATED_ON    DATE\n  );"
columns:
- name: cfmsid
  type: NVARCHAR
  nullable: true
  description: Comprehensive Financial Management System (CFMS) employee ID, serving
    as the unique system identifier for government employees.
- name: aadharnumber
  type: VARCHAR
  nullable: true
  description: 12-digit Aadhaar identification number of the employee. Used for biometric
    and identity verification.
- name: employeename
  type: NVARCHAR
  nullable: true
  description: Full legal name of the government employee.
- name: salary
  type: NVARCHAR
  nullable: true
  description: The current monthly salary, pay scale, or remuneration tier of the
    employee.
- name: category
  type: NVARCHAR
  nullable: true
  description: The primary employment or departmental category (e.g., Teaching, Non-Teaching,
    Contract, Regular).
- name: designation
  type: VARCHAR
  nullable: true
  description: The official job title or designation of the employee within their
    department.
- name: baadharnumber
  type: VARCHAR
  nullable: true
  description: Basic Aadhaar number or an alternative linked identifier used for specific
    scheme verifications.
- name: created_by
  type: VARCHAR
  nullable: true
  description: The user ID or automated system process that originally inserted this
    record into the database.
- name: is_active
  type: VARCHAR
  nullable: true
  description: Indicates if the entity is currently active in the system ('Y' for
    Yes, 'N' for No, or 'ACTIVE'/'INACTIVE').
- name: mobilenumber
  type: BIGINT
  nullable: true
  description: The primary 10-digit mobile contact number registered to the employee.
- name: action_date
  type: DATE
  nullable: true
  description: The date when the last major administrative action (like transfer,
    promotion, or onboarding) occurred.
- name: maincategory
  type: VARCHAR
  nullable: true
  description: The broad functional category, ministry, or parent department the employee
    belongs to.
- name: updated_on
  type: DATE
  nullable: true
  description: Timestamp of when this record was most recently updated in the source
    system.
